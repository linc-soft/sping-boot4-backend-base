# ========================================
# Development environment configuration file
# ========================================
spring:
  main:
    banner-mode: console

  # Data source settings
  datasource:
    # HikariCP connection pool settings
    hikari:
      # Maximum connection pool size
      maximum-pool-size: 5
      # Minimum idle connection pool size
      minimum-idle: 2
      # Connection timeout (milliseconds)
      connection-timeout: 30000
      # Idle timeout (milliseconds)
      idle-timeout: 600000
      # Maximum connection lifetime (milliseconds)
      max-lifetime: 1800000
      # Connection validity verification timeout (milliseconds)
      validation-timeout: 5000
      # Leak detection threshold (milliseconds)
      leak-detection-threshold: 60000

# Application settings
app:
  cache:
    # UserDetails cache TTL in minutes (short TTL for quick state change reflection)
    user-details-ttl-minutes: 2
    # Default cache TTL in hours
    default-ttl-hours: 1
  security:
    # Development environment includes API documentation endpoints
    public-endpoints:
      - /api/auth/login
      - /v3/api-docs
      - /v3/api-docs/**
      - /swagger-ui/**
      - /swagger-ui.html
