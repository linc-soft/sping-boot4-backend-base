# ========================================
# Production environment configuration file
# ========================================
spring:
  main:
    banner-mode: off

  # Data source settings
  datasource:
    # HikariCP connection pool settings
    hikari:
      # Maximum connection pool size
      maximum-pool-size: 30
      # Minimum idle connection pool size
      minimum-idle: 10
      # Connection timeout (milliseconds)
      connection-timeout: 10000
      # Idle timeout (milliseconds)
      idle-timeout: 600000
      # Maximum connection lifetime (milliseconds)
      max-lifetime: 1500000
      # Connection validity verification timeout (milliseconds)
      validation-timeout: 3000
      # Leak detection threshold (milliseconds)
      leak-detection-threshold: 0

  # Redis settings (production overrides)
  data:
    redis:
      lettuce:
        pool:
          # Higher pool size for production
          max-active: 16
          max-idle: 16
          min-idle: 4

# Application settings
app:
  csrf:
    # Enable Secure flag for CSRF cookie (HTTPS only in production)
    secure: true
  security:
    # Enable HSTS preload directive for production (requires 100% HTTPS coverage)
    hsts-preload: true
  async:
    core-pool-size: 8
    max-pool-size: 16
    queue-capacity: 2000
    await-termination-seconds: 60
