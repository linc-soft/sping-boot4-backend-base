# ========================================
# Main configuration file
# ========================================
server:
  port: 8080
  # Enable forwarded headers support for reverse proxy scenarios (Nginx, ALB, etc.)
  # This ensures request.getRemoteAddr() returns the actual client IP from X-Forwarded-For
  forward-headers-strategy: native

spring:
  main:
    banner-mode: off
  profiles:
    active: "@active.profile@"

  # Data source settings
  datasource:
    # Local MySQL connection URL
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_SCHEMA:schema}?useUnicode=true&characterEncoding=utf-8&useSSL=true&serverTimezone=Asia/Tokyo&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:password}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # Redis settings
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: 5000ms
      lettuce:
        pool:
          # Maximum active connections
          max-active: 8
          # Maximum idle connections
          max-idle: 8
          # Minimum idle connections
          min-idle: 2
          # Maximum wait time for connection (-1 = no limit)
          max-wait: 3000ms

# Application settings
app:
  # JWT settings
  jwt:
    # JWT secret key for signing and verifying tokens. must be 32 characters long
    secret: ${JWT_SECRET:}
  # Async thread pool settings
  async:
    core-pool-size: 4
    max-pool-size: 8
    queue-capacity: 500
    thread-name-prefix: "async-log-"
    wait-for-tasks-to-complete-on-shutdown: true
    await-termination-seconds: 30
  security:
    # Public endpoints bypass authentication and CSRF protection
    public-endpoints:
      - /api/auth/login
    # Auth-only whitelist requires CSRF but bypasses authentication
    auth-only-whitelist:
      - /api/auth/refresh
  # Access log settings
  access-log:
    exclude-path-patterns:
      - /actuator/**
      - /favicon.ico
      - /error
    batch-size: 100
    flush-interval-ms: 5000
    max-batches-per-flush: 20

# ========================================
# Actuator & Monitoring settings
# ========================================
management:
  server:
    port: 9090
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

# SpringDoc OpenAPI settings
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
