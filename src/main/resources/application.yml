# ========================================
# Main configuration file
# ========================================
server:
  port: 8080
  # Enable forwarded headers support for reverse proxy scenarios (Nginx, ALB, etc.)
  # This ensures request.getRemoteAddr() returns the actual client IP from X-Forwarded-For
  forward-headers-strategy: native

spring:
  main:
    banner-mode: off
  profiles:
    active: "@active.profile@"

  # Data source settings
  datasource:
    # Local MySQL connection URL
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_SCHEMA:schema}?useUnicode=true&characterEncoding=utf-8&useSSL=true&serverTimezone=Asia/Tokyo
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:password}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # Redis settings
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: 5000ms
      lettuce:
        pool:
          # Maximum active connections
          max-active: 8
          # Maximum idle connections
          max-idle: 8
          # Minimum idle connections
          min-idle: 2
          # Maximum wait time for connection (-1 = no limit)
          max-wait: 3000ms

# Application settings
app:
  # JWT settings
  jwt:
    # JWT secret key for signing and verifying tokens. must be 32 characters long
    secret: ${JWT_SECRET:}
  # Async thread pool settings
  async:
    core-pool-size: 4
    max-pool-size: 8
    queue-capacity: 500
    thread-name-prefix: "async-log-"
    wait-for-tasks-to-complete-on-shutdown: true
    await-termination-seconds: 30
  security:
    # Public endpoints bypass authentication and CSRF protection
    public-endpoints:
      - /api/auth/login
      - /api/common/enums
    # Auth-only whitelist requires CSRF but bypasses authentication
    auth-only-whitelist:
      - /api/auth/refresh
  # Access log settings
  access-log:
    exclude-path-patterns:
      - /actuator/**
      - /favicon.ico
      - /error
      - /api/auth/refresh
      - /api/logs/**
      - /api/common/**
    batch-size: 100
    flush-interval-ms: 5000
    max-batches-per-flush: 20

# ========================================
# Actuator & Monitoring settings
# ========================================
management:
  server:
    port: 9090
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

# MyBatis-Plus settings
mybatis-plus:
  global-config:
    db-config:
      # Logical delete configuration
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# SpringDoc OpenAPI settings
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

# ========================================
# PDF generation settings
# ========================================
pdf:
  template:
    # Page configuration (dimensions in mm)
    page:
      width: 210
      height: 297
      margin-left: 20
      margin-right: 20
      margin-top: 25
      margin-bottom: 25
    # Font configuration
    font:
      paths:
        # Chinese font path (environment variable override supported)
        chinese: ${PDF_CHINESE_FONT_PATH:}
        # Japanese font path (environment variable override supported)
        japanese: ${PDF_JAPANESE_FONT_PATH:}
      # Font sizes (in pt)
      default-size: 10
      title-size: 16
      header-size: 10
    # Table configuration
    table:
      border-width: 0.5
      border-style: solid
    # Header configuration
    header:
      height: 15
    # Footer configuration
    footer:
      height: 15
      show-page-number: true
      page-format: "{current}/{total}"
