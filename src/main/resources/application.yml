# ========================================
# Main configuration file
# ========================================
server:
  port: 8080
  # Enable forwarded headers support for reverse proxy scenarios (Nginx, ALB, etc.)
  # This ensures request.getRemoteAddr() returns the actual client IP from X-Forwarded-For
  forward-headers-strategy: native

spring:
  main:
    banner-mode: off
  profiles:
    active: "@active.profile@"

  # Multipart file upload settings
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 100MB

  # Data source settings
  datasource:
    # Local MySQL connection URL
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_SCHEMA:schema}?useUnicode=true&characterEncoding=utf-8&useSSL=true&serverTimezone=Asia/Tokyo
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:password}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # Redis settings
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: 5000ms
      lettuce:
        pool:
          # Maximum active connections
          max-active: 8
          # Maximum idle connections
          max-idle: 8
          # Minimum idle connections
          min-idle: 2
          # Maximum wait time for connection (-1 = no limit)
          max-wait: 3000ms

  # Mail settings
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    protocol: smtps
    default-encoding: utf-8
    properties:
      mail.smtp.auth: true
      mail.smtp.ssl.enable: true
      mail.smtp.starttls.enable: false
      mail.smtp.connectiontimeout: 5000
      mail.smtp.timeout: 5000
      mail.smtp.writetimeout: 5000

# Application settings
app:
  # JWT settings
  jwt:
    # JWT secret key for signing and verifying tokens. must be 32 characters long
    secret: ${JWT_SECRET:}
  # Async thread pool settings
  async:
    core-pool-size: 4
    max-pool-size: 8
    queue-capacity: 500
    thread-name-prefix: "async-log-"
    wait-for-tasks-to-complete-on-shutdown: true
    await-termination-seconds: 30
  # Report settings
  report:
    # Font directory for PDF generation (classpath or filesystem path)
    # Download Noto Sans fonts from https://fonts.google.com/noto and place in this directory
    font-path: classpath:/fonts/
    # Maximum records per PDF report export
    max-export-records: 10000
  # Password reset settings
  password-reset:
    # Password reset token TTL in minutes (default: 5)
    token-ttl-minutes: ${PASSWORD_RESET_TOKEN_TTL_MINUTES:5}
    # Frontend base URL for generating reset password links (e.g., http://localhost:5173)
    base-url: ${PASSWORD_RESET_BASE_URL:http://localhost:3000}
  # Mail sender display name
  mail:
    sender-name: ${MAIL_SENDER_NAME:System Notification}
  # File upload settings
  upload:
    # Local directory for storing uploaded files (relative to application root or absolute path)
    directory: ${UPLOAD_DIR:./uploads}
    # Maximum allowed file size in MB
    max-file-size-mb: ${UPLOAD_MAX_FILE_SIZE_MB:10}
    # Maximum number of files per upload request
    max-files-per-request: ${UPLOAD_MAX_FILES_PER_REQUEST:10}
    # Allowed file extensions (empty means allow all)
    allowed-extensions:
      - pdf
      - doc
      - docx
      - xls
      - xlsx
      - ppt
      - pptx
      - txt
      - csv
      - jpg
      - jpeg
      - png
      - gif
      - bmp
      - svg
      - zip
      - rar
      - 7z
  security:
    # Public endpoints bypass authentication and CSRF protection
    public-endpoints:
      - /api/auth/login
      - /api/auth/forgot-password
      - /api/auth/reset-password
      - /api/common/enums
    # Auth-only whitelist requires CSRF but bypasses authentication
    auth-only-whitelist:
      - /api/auth/refresh
  # Access log settings
  access-log:
    exclude-path-patterns:
      - /actuator/**
      - /favicon.ico
      - /error
      - /api/auth/refresh
      - /api/logs/**
      - /api/common/**
    batch-size: 100
    flush-interval-ms: 5000
    max-batches-per-flush: 20
  # Export task settings
  export:
    directory: ${EXPORT_DIR:./exports}
    ttl-hours: ${EXPORT_TTL_HOURS:24}
    max-records: ${EXPORT_MAX_RECORDS:50000}
  # SQL log settings
  sql-log:
    enabled: true
    # Only log SQL executed within matching request paths (Ant style). Empty = log all paths.
    include-path-patterns:
      - /api/master/**
      - /api/auth/login
      - /api/auth/reset-password
      - /api/auth/change-password
      - /api/auth/force-change-password
    # Always exclude these mappers (prevents recursive logging of log tables)
    exclude-mapper-classes:
      - SysAccessLogMapper
      - SysErrorLogMapper
      - SysFileUploadMapper
      - SysOperationLogMapper
      - SysSqlLogMapper
    batch-size: 200
    flush-interval-ms: 3000
    max-batches-per-flush: 30

# ========================================
# Actuator & Monitoring settings
# ========================================
management:
  server:
    port: 9090
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

# MyBatis-Plus settings
mybatis-plus:
  global-config:
    db-config:
      # Logical delete configuration
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# SpringDoc OpenAPI settings
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
