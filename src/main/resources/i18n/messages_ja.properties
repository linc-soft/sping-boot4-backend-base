# ========================================
# 日本語メッセージ
# ========================================

# 共通エラー
error.bad_request=不正なリクエスト
error.unauthorized=認証されていません
error.forbidden=アクセス禁止
error.not_found={0}が見つかりません
error.unique_constraint_violation={0}は既に存在します。別の値を使用してください。
error.insert_failed={0}の挿入に失敗しました。データを確認して再試行してください。
error.optimistic_lock_failed={0}は他のユーザーによって変更されました。更新して再試行してください。
error.resource_is_used={0}は他のリソースで使用されています。確認して再試行してください。
error.rate_limited=リクエストが多すぎます
error.internal_server_error=サーバー内部エラー

# システムエラー (100_001 - 100_999)
error.token_revoked=トークンが無効化されました
error.invalid_credentials=認証情報が無効です
error.invalid_refresh_token=リフレッシュトークンが無効です
error.ip_blocked=IPがブロックされました

# マスタデータエラー (200_001 - 200_999)
error.user_not_found=ユーザーが見つかりません
error.user_inactive=ユーザーが無効です
error.username_cannot_be_updated=ユーザー名は更新できません
error.circular_dependency={0}で循環依存が検出されました。階層構造を確認してください。
