# ========================================
# 中文消息
# ========================================
# 通用错误 (400~499: 客户端参数错误, 500~599: 服务端异常)
error.bad_request=错误的请求
error.unauthorized=未授权
error.forbidden=禁止访问
error.rate_limited=请求过于频繁
error.internal_server_error=服务器内部错误
# 系统错误 (999)
error.sys.token_revoked=令牌已撤销
error.sys.invalid_credentials=凭证无效
error.sys.invalid_refresh_token=刷新令牌无效
error.sys.ip_blocked=IP已被封禁
# 主数据-用户错误 (101)
error.user.username_cannot_be_updated=用户名无法更新
error.user.inactive=用户未激活
error.user.not_found=用户不存在
error.user.username_exists=用户名已存在
error.user.insert_failed=用户创建失败，请检查数据后重试
error.user.optimistic_lock_failed=用户已被其他用户修改，请刷新后重试
# 主数据-角色错误 (102)
error.role.circular_dependency=在角色继承中检测到循环依赖，请检查层级关系
error.role.base_cannot_be_deleted=基础角色不允许删除
error.role.not_found=角色不存在
error.role.inheritance_exists=角色继承关系已存在
error.role.optimistic_lock_failed=角色已被其他用户修改，请刷新后重试
error.role.in_use=该角色已分配给用户，无法删除
error.role.has_inheritance=该角色存在继承关系，无法删除
