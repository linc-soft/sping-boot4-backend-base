# 通用错误
error.bad_request=错误的请求
error.unauthorized=未授权
error.forbidden=禁止访问
error.not_found={0}未找到
error.unique_constraint_violation={0}已存在，请使用不同的值
error.insert_failed={0}插入失败，请检查数据后重试
error.optimistic_lock_failed={0}已被其他用户修改，请刷新后重试
